<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Anon Marketplace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"DM Serif Display"', 'Georgia', 'serif'],
            body: ['"DM Sans"', 'sans-serif'],
          },
          colors: {
            ink: { DEFAULT: '#0d0d0d', soft: '#1a1a1a', muted: '#6b7280' },
            stone: { light: '#f5f5f4', mid: '#e7e5e4', dark: '#a8a29e' },
            accent: { DEFAULT: '#c9a96e', light: '#f0e6d3', dark: '#a07840' },
          },
          animation: {
            'fade-up': 'fadeUp .4s ease forwards',
            'spin-slow': 'spin 3s linear infinite',
          },
          keyframes: {
            fadeUp: { from: { opacity: 0, transform: 'translateY(16px)' }, to: { opacity: 1, transform: 'none' } },
          },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .font-display { font-family: 'DM Serif Display', serif; }
    #app-toast { transition: all .3s cubic-bezier(.4,0,.2,1); }
    .stripe-card-element {
      padding: 12px;
      background: #f5f5f4;
      border-radius: 12px;
      border: 1px solid transparent;
      transition: border-color 0.2s;
    }
    .stripe-card-element--focus { border-color: #0d0d0d; }
    input:focus { outline: none; border-color: rgba(13,13,13,0.2) !important; }
    .nav-link::after { content:''; display:block; height:1px; background:currentColor; transform:scaleX(0); transition:transform .25s; transform-origin:left; }
    .nav-link:hover::after { transform:scaleX(1); }
    .mobile-nav-item.active { color: #c9a96e; }
    .safe-area-pb { padding-bottom: env(safe-area-inset-bottom, 0); }
    @media (max-width: 1023px) { body { padding-bottom: 4.5rem; } }
    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-thumb { background:#d6d3d1; border-radius:99px; }
    /* Payment method toggle */
    .pay-method-card { cursor:pointer; transition: all .2s; }
    .pay-method-card.selected { border-color: #0d0d0d; background: #f5f5f4; }
    .pay-method-card:hover:not(.selected) { border-color: #a8a29e; }
  </style>
</head>
<body class="bg-white text-ink font-body antialiased">

<!-- ═══════════════════ TOAST ═══════════════════ -->
<div id="app-toast" class="fixed bottom-6 right-6 z-[9999] flex items-center gap-3 px-5 py-3.5 rounded-xl shadow-xl text-sm font-medium translate-y-4 opacity-0 pointer-events-none max-w-xs transition-all duration-300">
  <ion-icon id="toast-icon" name="checkmark-circle-outline" class="text-lg flex-shrink-0"></ion-icon>
  <span id="toast-msg">Message</span>
</div>

<!-- ═══════════════════ UNIFIED HEADER ═══════════════════ -->
<header class="sticky top-0 z-[500] bg-white/95 backdrop-blur border-b border-stone-mid">

    <!-- Desktop nav -->
    <nav class="hidden lg:flex items-center gap-7 ml-4 flex-1">
      <a href="../index.html" class="nav-link text-sm font-medium">Home</a>
      <div class="relative group">

        <div class="absolute top-full left-0 pt-4 hidden group-hover:block">
          <div class="bg-white border border-stone-mid rounded-xl shadow-xl p-5 w-56 space-y-1">
            <a href="shop.html" class="block px-3 py-2 text-sm rounded-lg hover:bg-stone-light transition-colors">All Products</a>
            <div id="nav-categories" class="space-y-1"></div>

      </div>

    <!-- Search (desktop) -->
    <div class="flex-1 max-w-xs hidden md:block">

        <input id="search-input" type="search" placeholder="Search products…"

    <!-- Actions -->

      <!-- Logged-in user menu -->
      <div id="user-menu" class="hidden items-center gap-1">
        <a id="nav-account-link" href="account.html" class="flex items-center gap-2 px-3 py-2 rounded-full hover:bg-stone-light transition-colors text-sm font-medium">
          <div class="w-7 h-7 rounded-full bg-ink text-white flex items-center justify-center text-xs font-bold" id="user-avatar-init">A</div>
          <span id="user-name-nav" class="hidden sm:block"></span>

        <a id="nav-vendor-link" href="vendor-dashboard.html" class="hidden p-2 rounded-full hover:bg-stone-light transition-colors text-ink/60 hover:text-ink" title="Vendor Dashboard">
          <ion-icon name="storefront-outline" class="text-lg"></ion-icon>
        </a>
        <a id="nav-admin-link" href="admin-dashboard.html" class="hidden p-2 rounded-full hover:bg-stone-light transition-colors text-ink/60 hover:text-ink" title="Admin">
          <ion-icon name="settings-outline" class="text-lg"></ion-icon>
        </a>
        <button id="logout-btn" class="p-2 rounded-full hover:bg-stone-light transition-colors text-ink/60 hover:text-ink" title="Logout">
          <ion-icon name="log-out-outline" class="text-lg"></ion-icon>

      </div>
      <!-- Wishlist -->
      <a href="account.html#wishlist" class="hidden sm:flex p-2 rounded-full hover:bg-stone-light transition-colors relative">
        <ion-icon name="heart-outline" class="text-lg text-ink/70"></ion-icon>
      </a>
      <!-- Cart -->
      <button id="cart-btn" class="p-2 rounded-full hover:bg-stone-light transition-colors relative">
        <ion-icon name="bag-handle-outline" class="text-lg text-ink/70"></ion-icon>
        <span id="cart-badge" class="absolute -top-0.5 -right-0.5 w-4 h-4 bg-accent text-white text-[9px] font-bold rounded-full flex items-center justify-center opacity-0">0</span>
      </button>
      <!-- Mobile hamburger -->
      <button id="mobile-menu-btn" class="lg:hidden p-2 rounded-full hover:bg-stone-light transition-colors">
        <ion-icon name="menu-outline" class="text-xl"></ion-icon>
      </button>
    </div>
  </div>

  <!-- Mobile dropdown menu -->
  <div id="mobile-menu" class="lg:hidden hidden border-t border-stone-mid bg-white px-4 pb-4 space-y-1">
    <a href="../index.html" class="block px-3 py-2.5 text-sm font-medium rounded-lg hover:bg-stone-light">Home</a>
    <a href="shop.html" class="block px-3 py-2.5 text-sm font-medium rounded-lg hover:bg-stone-light">Shop</a>
    <a href="shop.html?sort=newest" class="block px-3 py-2.5 text-sm font-medium rounded-lg hover:bg-stone-light">New In</a>
    <a href="vendors.html" class="block px-3 py-2.5 text-sm font-medium rounded-lg hover:bg-stone-light">Vendors</a>
    <a href="account.html" class="block px-3 py-2.5 text-sm font-medium rounded-lg hover:bg-stone-light">My Account</a>
  </div>

  <!-- Mobile search bar (collapsible) -->
  <div id="mobile-search-bar" class="md:hidden hidden px-4 pb-3">
    <form id="search-form-mobile" class="relative">
      <input id="search-input-mobile" type="search" placeholder="Search products…"
        class="w-full pl-10 pr-4 py-2.5 bg-stone-light rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-ink/10 transition-all">
      <ion-icon name="search-outline" class="absolute left-3.5 top-1/2 -translate-y-1/2 text-ink/40 text-base"></ion-icon>
    </form>
  </div>
</header>

<!-- ═══════════════════ MOBILE BOTTOM NAVBAR ═══════════════════ -->
<nav id="mobile-bottom-nav" class="lg:hidden fixed bottom-0 left-0 right-0 z-[600] bg-white/95 backdrop-blur border-t border-stone-mid safe-area-pb">
  <div class="flex items-center justify-around px-2 py-2 pb-[max(0.5rem,env(safe-area-inset-bottom))]">

    <a href="vendors.html" class="mobile-nav-item flex flex-col items-center gap-0.5 px-4 py-1.5 rounded-xl transition-colors text-ink/50 hover:text-ink">

      <span class="text-[10px] font-medium">Vendors</span>

      <span class="text-[10px] font-medium">Checkout</span>

  </div>
</nav>

<!-- Checkout step indicator -->
<div class="border-b border-stone-mid bg-stone-light/50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-center gap-3 text-[10px] uppercase tracking-[0.2em] font-bold text-ink/30">
    <span class="text-ink">01 Cart</span>
    <ion-icon name="chevron-forward-outline"></ion-icon>
    <span id="step-details" class="text-ink">02 Details</span>
    <ion-icon name="chevron-forward-outline"></ion-icon>
    <span id="step-payment" class="">03 Payment</span>
  </div>
</div>

<main class="max-w-7xl mx-auto px-4 sm:px-6 py-12 lg:py-20">
  <div id="checkout-container" class="grid lg:grid-cols-12 gap-16 items-start">
    <!-- Left: Shipping & Payment -->
    <div class="lg:col-span-7 space-y-10">
      <section>
        <h2 class="font-display text-3xl mb-8">Shipping Information</h2>
        <form id="shipping-form" class="grid grid-cols-2 gap-4">
          <div class="col-span-2">
            <label class="block text-[10px] uppercase tracking-widest font-bold text-ink/40 mb-2">Full Name</label>
            <input type="text" name="fullName" required placeholder="John Doe" class="w-full px-5 py-4 bg-stone-light rounded-xl text-sm border border-transparent focus:border-ink/20 focus:outline-none transition-all">
          </div>
          <div>
            <label class="block text-[10px] uppercase tracking-widest font-bold text-ink/40 mb-2">Phone Number</label>
            <input type="tel" name="phone" required placeholder="+1..." class="w-full px-5 py-4 bg-stone-light rounded-xl text-sm border border-transparent focus:border-ink/20 focus:outline-none transition-all">
          </div>
          <div>
            <label class="block text-[10px] uppercase tracking-widest font-bold text-ink/40 mb-2">Email</label>
            <input type="email" name="email" required placeholder="you@example.com" class="w-full px-5 py-4 bg-stone-light rounded-xl text-sm border border-transparent focus:border-ink/20 focus:outline-none transition-all">
          </div>
          <div class="col-span-2">
            <label class="block text-[10px] uppercase tracking-widest font-bold text-ink/40 mb-2">Street Address</label>
            <input type="text" name="street" required placeholder="123 Main St" class="w-full px-5 py-4 bg-stone-light rounded-xl text-sm border border-transparent focus:border-ink/20 focus:outline-none transition-all">
          </div>
          <div>
            <label class="block text-[10px] uppercase tracking-widest font-bold text-ink/40 mb-2">City</label>
            <input type="text" name="city" required placeholder="New York" class="w-full px-5 py-4 bg-stone-light rounded-xl text-sm border border-transparent focus:border-ink/20 focus:outline-none transition-all">
          </div>
          <div>
            <label class="block text-[10px] uppercase tracking-widest font-bold text-ink/40 mb-2">ZIP</label>
            <input type="text" name="zip" required placeholder="10001" class="w-full px-5 py-4 bg-stone-light rounded-xl text-sm border border-transparent focus:border-ink/20 focus:outline-none transition-all">
          </div>
        </form>
      </section>

      <!-- Payment Method (COD Only) -->
      <section id="payment-section" class="pt-4">
        <h2 class="font-display text-3xl mb-6">Payment Method</h2>
        <div class="p-6 border-2 border-ink bg-stone-light rounded-2xl flex items-center justify-between">
          <div class="flex items-center gap-4">
            <ion-icon name="cash-outline" class="text-3xl text-ink"></ion-icon>
            <div>
              <p class="font-bold text-sm">Cash on Delivery</p>
              <p class="text-xs text-ink/40">Pay in person when your order arrives.</p>
            </div>
          </div>
          <ion-icon name="checkmark-circle" class="text-2xl text-ink"></ion-icon>
        </div>
      </section>

      <button id="btn-place-order" class="w-full bg-ink text-white py-5 rounded-2xl text-sm font-bold uppercase tracking-widest hover:bg-ink/80 transition-all flex items-center justify-center gap-2">
        Place Order
      </button>
    </div>

    <!-- Right: Summary (Price Fix Included) -->
    <div id="checkout-summary" class="lg:col-span-5 lg:sticky lg:top-32">
      <!-- Content populated by JS -->
    </div>
  </div>
</main>

<script src="../assets/js/api.js"></script>
<script>
  let cartData = null;
  let currentOrderId = null;

  function showToast(msg, type = 'success') {
    const t = document.getElementById('app-toast');
    const msgEl = document.getElementById('toast-msg');
    const icon = document.getElementById('toast-icon'); // Assuming you have an icon element
    
    msgEl.textContent = msg;
    
    // Style updates for toast
    t.className = `fixed bottom-6 right-6 z-[9999] flex items-center gap-3 px-5 py-3.5 rounded-xl shadow-xl text-sm font-medium transition-all duration-300 max-w-xs ${type === 'success' ? 'bg-ink text-white' : 'bg-red-600 text-white'}`;
    
    // Animation logic
    t.classList.remove('translate-y-4', 'opacity-0', 'pointer-events-none');
    t.classList.add('translate-y-0', 'opacity-100', 'pointer-events-auto');
    
    setTimeout(() => {
      t.classList.add('translate-y-4', 'opacity-0', 'pointer-events-none');
      t.classList.remove('translate-y-0', 'opacity-100', 'pointer-events-auto');
    }, 3000);
  }

  // --- NEW: Function to fill form with User Data ---
  function populateForm(user) {
    const form = document.getElementById('shipping-form');
    if (!form || !user) return;

    // Handle Address: It might be an object or a string depending on your Mongoose User Model
    // We try to access nested properties first, then fallback to flat properties just in case.
    const addr = user.address || {};

    // Set Basic Info
    if (form.fullName) form.fullName.value = user.name || '';
    if (form.phone) form.phone.value = user.phone || '';
    if (form.email) form.email.value = user.email || '';

    // Set Address Info
    // Note: If your User model stores address as a single string (e.g., "123 Main St"), 
    // only the street field will be filled. If it's an object (street, city, etc), 
    // all will fill.
    if (form.street) form.street.value = addr.street || user.street || '';
    if (form.city) form.city.value = addr.city || user.city || '';
    if (form.zip) form.zip.value = addr.zip || user.zip || '';
    if (form.country) form.country.value = addr.country || user.country || 'USA';
  }

  async function init() {
    if (!Auth.isLoggedIn()) { window.location.href = '../index.html'; return; }
    
    updateNav(); // Uses your existing logic

    try {
      // 1. Load Cart
      cartData = await Cart.get();
      if (!cartData.cart || cartData.cart.items.length === 0) {
        window.location.href = 'shop.html';
        return;
      }
      renderSummary();

      try {
        const profileRes = await Users.profile();
        const user = profileRes.user;
        populateForm(user);
      } catch (profileError) {
        console.warn("Could not load user profile for pre-filling:", profileError);
        // We don't stop checkout if profile fails, just let user type manually
      }

    } catch (e) { 
      showToast(e.message, 'error'); 
    }
  }

  function renderSummary() {
    const { cart, subtotal } = cartData;
    const shipping = subtotal >= 55 ? 0 : 5.99;
    const total = subtotal + shipping;

    const summaryEl = document.getElementById('checkout-summary');
    summaryEl.innerHTML = `
      <div class="bg-stone-light rounded-[2.5rem] p-8 lg:p-10">
        <h2 class="font-display text-2xl mb-8">Order Summary</h2>
        <div class="space-y-6 mb-10">
          ${cart.items.map(item => `
            <div class="flex gap-4">
              <img src="${item.product?.thumbnail}" class="w-16 h-20 object-cover rounded-xl bg-white">
              <div class="flex-1">
                <p class="text-sm font-medium line-clamp-1">${item.product?.name}</p>
                <p class="text-xs text-ink/40">Qty: ${item.quantity}</p>
                <p class="text-sm font-display mt-1">$${(item.price * item.quantity).toFixed(2)}</p>
              </div>
            </div>
          `).join('')}
        </div>
        <div class="space-y-3 pt-6 border-t border-stone-mid/50 text-sm">
          <div class="flex justify-between text-ink/50"><span>Subtotal</span><span>$${subtotal.toFixed(2)}</span></div>
          <div class="flex justify-between text-ink/50"><span>Shipping</span><span>${shipping === 0 ? 'FREE' : '$' + shipping.toFixed(2)}</span></div>
          <div class="flex justify-between text-xl font-display pt-4 border-t border-stone-mid text-ink">
            <span>Total</span><span>$${total.toFixed(2)}</span>
          </div>
        </div>
      </div>
    `;
  }

  async function handlePlaceOrder() {
    const form = document.getElementById('shipping-form');
    if (!form.checkValidity()) { form.reportValidity(); return; }

    const btn = document.getElementById('btn-place-order');
    const originalBtnText = btn.innerHTML;
    btn.innerHTML = '<ion-icon name="sync-outline" class="animate-spin"></ion-icon> Processing...';
    btn.disabled = true;

    try {
      const fd = new FormData(form);
      const payload = {
        shippingAddress: {
          fullName: fd.get('fullName'),
          phone:    fd.get('phone'),
          email:    fd.get('email'),
          street:   fd.get('street'),
          city:     fd.get('city'),
          zip:      fd.get('zip'),
          country:  fd.get('country') || 'USA'
        },
        paymentMethod: 'cod'
      };

      const res = await Orders.create(payload);
      showToast('Order Placed Successfully!');
      
      setTimeout(() => {
        window.location.href = `account.html#orders`; 
      }, 1500);

    } catch (e) {
      showToast(e.message, 'error');
      btn.innerHTML = originalBtnText;
      btn.disabled = false;
    }
  }

  function updateNav() {
    const user = Auth.getUser();
    if (!user) {
      document.getElementById('login-btn-nav')?.classList.remove('hidden');
      document.getElementById('user-menu')?.classList.add('hidden');
      return;
    }
    document.getElementById('login-btn-nav')?.classList.add('hidden');
    document.getElementById('user-menu')?.classList.remove('hidden');
    document.getElementById('user-menu')?.classList.add('flex');
    document.getElementById('user-avatar-init').textContent = user.name.charAt(0);
    document.getElementById('user-name-nav').textContent = user.name.split(' ')[0];
    
    // Logic to show/hide vendor/admin links
    if(document.getElementById('nav-vendor-link')) 
        document.getElementById('nav-vendor-link').classList.toggle('hidden', user.role !== 'vendor');
    if(document.getElementById('nav-admin-link')) 
        document.getElementById('nav-admin-link').classList.toggle('hidden', user.role !== 'admin');
  }

  document.getElementById('btn-place-order').addEventListener('click', handlePlaceOrder);
  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
